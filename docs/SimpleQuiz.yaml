      - url: "{{ _.local5001 }}/quizzes"
        name: createQuiz
        meta:
          id: req_676332c0581d4f90835149a58304e465
          created: 1764636797340
          modified: 1772077558459
          isPrivate: false
          description: Tạo một Quiz mới (gửi title, description trong body).
          sortKey: -1764636980614
        method: POST
        body:
          mimeType: application/json
          text: >
            {
              "title": "Basic Science Quiz111",
              "description": "Test your knowledge of physics, chemistry, and biology fundamentals111"
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: User-Agent
            value: insomnia/12.1.0
            description: ""
            disabled: false
        scripts:
          afterResponse: |
            // Parse response body
            const response = JSON.parse(insomnia.response.text());

            // Lấy _id từ response
            const quizId = response.data?._id;

            if (!quizId) {
              console.log("❌ Không tìm thấy quizId trong response");
              return;
            }

            // Tạo tên biến động (dựa theo timestamp)
            const timestamp = new Date().getTime();
            const variableName = `quiz_id_${timestamp}`;

            // Lưu vào Environment
            insomnia.environment.set(variableName, quizId);

            // Log để kiểm tra
            console.log(`✅ Saved ${variableName} = ${quizId}`);
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
